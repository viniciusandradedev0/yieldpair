[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Allows script/Deploy.s.sol to write deployments/<network>.json at the repo root
# (one level above this `contracts/` project root). `read-write` is required on
# the parent directory `..` (not just `../deployments`) because `vm.createDir`
# needs write access to the parent to create the `deployments/` directory itself
# on first run.
fs_permissions = [{ access = "read-write", path = ".." }]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 50
fail_on_revert = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Sepolia RPC e Etherscan lidos do ambiente nos scripts de deploy.
[rpc_endpoints]
sepolia = "${ALCHEMY_SEPOLIA_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
